# The req2prod.nl product site, plus the admin console at /app.
#
# The static site is served from /var/www, never from the repo checkout -- the
# web server must not have traverse permission into the app user's home
# directory.
#
# HTTP-only as committed. certbot --nginx adds the listen 443 / ssl_* lines and
# the port 80 redirect in place; re-copy the live file back here afterwards.
# (It has already done so on the box: https://req2prod.nl serves with a valid
# certificate. This file is the pre-certbot source of truth, not a copy of what
# is running.)
server {
    listen 80;
    server_name req2prod.nl www.req2prod.nl;

    root /var/www/req2prod.nl;

    # site/index.html is the homepage and try_files serves it at /. An earlier
    # draft parked the one-pager at /main and redirected / to it, because no
    # homepage existed then. One exists now, and both pages' nav links to / and
    # /details.html, so a root redirect would break Home. Do not add one.
    location / {
        try_files $uri $uri/ =404;
    }

    # The admin console (req2prod_app.py, req2prod.service) -- a second
    # Streamlit process, so that restarting the public Job Finder app never
    # takes the console down with it. See
    # docs/superpowers/specs/2026-07-16-split-admin-console-from-job-finder-design.md.
    #
    # No trailing slash on proxy_pass: the /app prefix must reach Streamlit
    # intact, because req2prod.service starts it with --server.baseUrlPath /app
    # and it serves its own assets and websocket under that prefix. Strip the
    # prefix here and every request 404s inside Streamlit instead.
    #
    # The Upgrade/Connection headers are not optional -- Streamlit is a
    # websocket app and renders a permanently blank page without them.
    location /app {
        proxy_pass http://127.0.0.1:8502;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }
}
