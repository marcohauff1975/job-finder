server {
    server_name yourmagicaljobfinder.online www.yourmagicaljobfinder.online 16.171.202.23;

    # Static Req2Prod investor one-pager. Exact-match so it takes priority over
    # the "location /" Streamlit proxy below without affecting any other path.
    #
    # Served from /var/www rather than the repo checkout, so that nginx needs no
    # traverse permission into the app user's home directory. Deploy copies the
    # file out of static/req2prod/ into /var/www/req2prod/ -- see
    # infra/README-req2prod.md.
    location = /req2prod {
        alias /var/www/req2prod/index.html;
        default_type text/html;
        add_header Cache-Control "no-store";
    }

    location / {
        proxy_pass http://127.0.0.1:8501;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/yourmagicaljobfinder.online/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/yourmagicaljobfinder.online/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot


}
server {
    if ($host = www.yourmagicaljobfinder.online) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = yourmagicaljobfinder.online) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name yourmagicaljobfinder.online www.yourmagicaljobfinder.online 16.171.202.23;
    return 404; # managed by Certbot




}