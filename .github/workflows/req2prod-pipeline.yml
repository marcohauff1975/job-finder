name: Req2Prod Pipeline

# One combined pipeline, replacing the previously separate "PR code
# review" and "AI prod flow" workflows: every PR still gets an
# automated review (code_review job, unchanged from before). Whether
# merging into main also auto-deploys depends on the AUTO_DEPLOY_ON_MERGE
# repo variable (see toggle-demo-mode.command) - off by default for
# regular development (deploy stays a manual "Run workflow" click, via
# workflow_dispatch below, same as the old separate "AI prod flow"),
# on for demos so a merge cascades straight through to production
# without anyone touching the Actions tab. The two triggered-by-event
# jobs never run in the same execution - pull_request and push are
# different events, so each run only has the job matching its own
# event's `if:` actually execute; the other shows as skipped.
# Sequencing (review before deploy) is enforced by main's branch
# protection requiring an approving review before a merge can happen
# at all, not by an explicit `needs:` here.
on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: eu-north-1
  LIGHTSAIL_INSTANCE: job-finder
  REMOTE_APP_DIR: /home/ubuntu/crewai-starter
  REMOTE_USER: ubuntu
  SERVICE_NAME: jobfinder.service
  ADMIN_SERVICE_NAME: req2prod.service
  PROD_URL: https://yourmagicaljobfinder.online

jobs:
  # Decides which backend code_review/deploy actually use, in exactly one
  # place, so the runs-on choice below and the AGENT_BACKEND passed into
  # each script can never disagree. AGENT_BACKEND (a repo variable, "api"
  # by default) only ever resolves to "subscription" for a trusted trigger
  # - a same-repo PR (never a fork's), or a push/workflow_dispatch (which
  # can only be triggered by someone with write access to begin with).
  # That's not a cost optimization, it's a security boundary:
  # "subscription" routes the job onto a self-hosted runner (Marco's own
  # laptop, authenticated via his Claude subscription - see
  # req2prod/backend.py), and a self-hosted runner executing an external
  # fork's checked-out code is GitHub's own documented anti-pattern for
  # public repos. A fork PR silently falls back to "api" (GitHub-hosted,
  # as always) regardless of what the toggle says.
  resolve_backend:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.resolve.outputs.backend }}
    steps:
      - id: resolve
        env:
          REQUESTED_BACKEND: ${{ vars.AGENT_BACKEND }}
          IS_TRUSTED_TRIGGER: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
        run: |
          if [ "$REQUESTED_BACKEND" = "subscription" ] && [ "$IS_TRUSTED_TRIGGER" = "true" ]; then
            echo "backend=subscription" >> "$GITHUB_OUTPUT"
          else
            echo "backend=api" >> "$GITHUB_OUTPUT"
          fi
          echo "Resolved AGENT_BACKEND=$REQUESTED_BACKEND, trusted trigger=$IS_TRUSTED_TRIGGER"

  code_review:
    needs: resolve_backend
    if: github.event_name == 'pull_request'
    runs-on: ${{ needs.resolve_backend.outputs.backend == 'subscription' && 'self-hosted' || 'ubuntu-latest' }}
    steps:
      # ref + token here matter beyond "which commit to check out": if
      # pr_fix_agent applies a fix, code_review_runner.py commits and
      # pushes it directly from this checkout (see that file's own
      # docstring for why it's one push at the end, not one per
      # attempt). Checking out the default merge-ref would leave that
      # push with nowhere real to land (detached HEAD, not a branch);
      # the repo's default GITHUB_TOKEN is also read-only (see repo
      # Settings -> Actions -> General), so it can't push at all -
      # REVIEWER_BOT_TOKEN (same identity that already reviews/merges
      # today) is what actually has write access. Only correct for
      # same-repo PRs (head.repo == base.repo) - a fork PR's head.ref
      # wouldn't exist in this repo to check out, and this project has
      # never had external fork contributors.
      - name: Checkout the PR's actual branch (not the merge ref)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.REVIEWER_BOT_TOKEN }}

      # code_review_runner.py re-diffs against origin/main after every
      # pr_fix_agent attempt (see _current_diff_vs_main) - the default
      # single-branch checkout above doesn't fetch main at all.
      - name: Fetch main (for re-diffing after each fix attempt)
        run: git fetch origin main

      # actions/setup-python assumes a GitHub-hosted runner's own
      # "runner" user/home-directory layout for its tool cache - on a
      # self-hosted runner (subscription mode) that's someone else's
      # laptop with its own user account, so this step fails outright
      # with a permission error trying to create /Users/runner. Skipped
      # there: the self-hosted runner already has a working Python (this
      # whole repo's local dev workflow depends on it) - only the
      # GitHub-hosted/api path needs a guaranteed, freshly-provisioned one.
      - name: Set up Python
        if: needs.resolve_backend.outputs.backend != 'subscription'
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies (for the CrewAI agent)
        # python3 -m pip, not bare `pip` - on the self-hosted runner
        # (subscription mode, no actions/setup-python step above to put
        # `pip` on PATH), GitHub Actions steps run via a non-login,
        # non-interactive shell that doesn't source .zshrc/.zprofile, so
        # only whatever was already on PATH when the runner process
        # itself started is available. python3 ships with macOS itself
        # (Xcode Command Line Tools) and is far more likely to already be
        # on that minimal PATH than a bare `pip` alias.
        run: python3 -m pip install -r requirements.txt

      - name: Get the PR diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr diff ${{ github.event.pull_request.number }} --repo ${{ github.repository }} > /tmp/pr.diff

      - name: Run code_reviewer (and pr_fix_agent / pr_arbiter if needed)
        env:
          AGENT_BACKEND: ${{ needs.resolve_backend.outputs.backend }}
          # Only set for "api" mode - claude -p (subscription mode) refuses
          # to run non-interactively when both an API key and a claude.ai
          # login are present ("claude.ai connectors are disabled because
          # ANTHROPIC_API_KEY or another auth source is set and takes
          # precedence over your claude.ai login"), so this must be unset
          # (not just unused) whenever the self-hosted runner's own
          # `claude login` session is what should actually authenticate.
          ANTHROPIC_API_KEY: ${{ needs.resolve_backend.outputs.backend == 'api' && secrets.ANTHROPIC_API_KEY || '' }}
          REVIEWER_BOT_TOKEN: ${{ secrets.REVIEWER_BOT_TOKEN }}
          DIFF_FILE: /tmp/pr.diff
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: python3 -m req2prod.code_review_runner

  deploy:
    needs: resolve_backend
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.AUTO_DEPLOY_ON_MERGE == 'true')
    runs-on: ${{ needs.resolve_backend.outputs.backend == 'subscription' && 'self-hosted' || 'ubuntu-latest' }}
    environment: production
    steps:
      - name: Checkout (full history, so we can diff against the previous commit)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Same self-hosted-runner exception as code_review's own Set up
      # Python step above - see that step's comment.
      - name: Set up Python
        if: needs.resolve_backend.outputs.backend != 'subscription'
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies (for the CrewAI agents)
        # Same self-hosted-runner PATH reasoning as code_review's own
        # install step above - see that step's comment.
        run: python3 -m pip install -r requirements.txt

      # prod_tester's check_production_health drives a real headless
      # browser (see req2prod/tools/prod_ops.py) - pip install alone only
      # gets the Python package, not the actual browser binary. Without
      # this, the browser launch itself fails on every run, which reads
      # identically to "the page shows an error" and triggers a rollback
      # regardless of whether production is actually fine.
      - name: Install Playwright's browser (for prod_tester's page check)
        run: playwright install --with-deps chromium

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Fetch a short-lived SSH cert for the Lightsail instance
        run: |
          set -euo pipefail
          aws lightsail get-instance-access-details \
            --instance-name "$LIGHTSAIL_INSTANCE" \
            --region "$AWS_REGION" \
            --protocol ssh \
            --output json > /tmp/access.json
          INSTANCE_IP=$(python3 -c "import json; print(json.load(open('/tmp/access.json'))['accessDetails']['ipAddress'])")
          python3 -c "
          import json
          d = json.load(open('/tmp/access.json'))['accessDetails']
          open('/tmp/deploy_key', 'w').write(d['privateKey'])
          open('/tmp/deploy_key-cert.pub', 'w').write(d['certKey'])
          "
          chmod 600 /tmp/deploy_key
          rm /tmp/access.json
          echo "INSTANCE_IP=$INSTANCE_IP" >> "$GITHUB_ENV"

      - name: Capture the commit currently running in production
        id: pre_deploy
        run: |
          PREV_COMMIT=$(ssh -o StrictHostKeyChecking=accept-new -i /tmp/deploy_key "$REMOTE_USER@$INSTANCE_IP" \
            "cd $REMOTE_APP_DIR && git rev-parse HEAD")
          echo "previous_commit=$PREV_COMMIT" >> "$GITHUB_OUTPUT"
          echo "Production is currently on: $PREV_COMMIT"

      - name: Pull latest main on the server
        # agent_models.json is runtime state (edited live via the admin "AI
        # Models" tab) and is gitignored, so it must survive the pull. Untrack
        # it on the server (keeps the working file) so `git pull --ff-only`
        # never conflicts on it - this also heals the one-time transition from
        # when it was tracked. No backup/restore, so no concurrency or
        # admin-edit race. Same handling as deploy-to-prod.yml's pull step.
        run: |
          ssh -o StrictHostKeyChecking=accept-new -i /tmp/deploy_key "$REMOTE_USER@$INSTANCE_IP" \
            "cd $REMOTE_APP_DIR && git rm --cached --ignore-unmatch req2prod/config/agent_models.json && git pull --ff-only origin main"

      # nginx serves req2prod.nl from /var/www, not from the checkout, so the
      # pull above does not update the served site. The script guards against
      # syncing an empty tree, which --delete would turn into a wipe.
      - name: Sync the req2prod.nl site to /var/www
        run: |
          ssh -o StrictHostKeyChecking=accept-new -i /tmp/deploy_key "$REMOTE_USER@$INSTANCE_IP" \
            "sudo $REMOTE_APP_DIR/infra/sync-site.sh $REMOTE_APP_DIR"

      # Which services, not whether - the app is two Streamlit processes now
      # (see req2prod/deploy_targets.py). Restarting both for every change
      # would mean shipping a Job Finder tweak still kills the SDLC view
      # someone is watching that very deploy through, which is the whole
      # problem the split exists to fix.
      #
      # The rule lives in Python, not in a grep here: it has real edge cases
      # (shared code restarts both, an unclassified file restarts both, a
      # published page restarts nothing) and those are worth testing. See
      # tests/test_deploy_targets.py.
      - name: Decide which services need restarting
        id: diff
        run: |
          NEW_COMMIT=$(git rev-parse HEAD)
          echo "new_commit=$NEW_COMMIT" >> "$GITHUB_OUTPUT"
          CHANGED=$(git diff --name-only "${{ steps.pre_deploy.outputs.previous_commit }}" "$NEW_COMMIT")
          echo "Changed files:"
          echo "$CHANGED"
          RESTART=$(echo "$CHANGED" | python3 -m req2prod.deploy_targets)
          echo "Services to restart: ${RESTART:-(none)}"
          echo "restart_services=$RESTART" >> "$GITHUB_OUTPUT"
          {
            echo "change_summary<<EOF"
            git log --oneline "${{ steps.pre_deploy.outputs.previous_commit }}..$NEW_COMMIT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      # Without this, a new dependency in requirements.txt only ever
      # gets installed into this runner's own throwaway environment
      # (for the crew that runs prod_tester below), never into the
      # server's persistent venv - the app would restart straight into
      # a ModuleNotFoundError with no warning, exactly what happened
      # before this step existed.
      # Both processes share one venv, so this runs if either is restarting.
      - name: Install dependencies on the server
        if: steps.diff.outputs.restart_services != ''
        run: |
          ssh -o StrictHostKeyChecking=accept-new -i /tmp/deploy_key "$REMOTE_USER@$INSTANCE_IP" \
            "cd $REMOTE_APP_DIR && venv/bin/pip install -r requirements.txt"

      - name: Restart jobfinder.service (the public app)
        if: contains(steps.diff.outputs.restart_services, 'jobfinder')
        run: |
          ssh -o StrictHostKeyChecking=accept-new -i /tmp/deploy_key "$REMOTE_USER@$INSTANCE_IP" "sudo systemctl restart $SERVICE_NAME"
          sleep 5

      # Skipped for a Job Finder-only change, which is the point: the SDLC view
      # someone is watching this deploy through lives in this process.
      - name: Restart req2prod.service (the admin console)
        if: contains(steps.diff.outputs.restart_services, 'req2prod')
        run: |
          ssh -o StrictHostKeyChecking=accept-new -i /tmp/deploy_key "$REMOTE_USER@$INSTANCE_IP" "sudo systemctl restart $ADMIN_SERVICE_NAME"
          sleep 5

      - name: Run prod_tester (and rollback_agent if needed)
        env:
          AGENT_BACKEND: ${{ needs.resolve_backend.outputs.backend }}
          # Only set for "api" mode - claude -p (subscription mode) refuses
          # to run non-interactively when both an API key and a claude.ai
          # login are present ("claude.ai connectors are disabled because
          # ANTHROPIC_API_KEY or another auth source is set and takes
          # precedence over your claude.ai login"), so this must be unset
          # (not just unused) whenever the self-hosted runner's own
          # `claude login` session is what should actually authenticate.
          ANTHROPIC_API_KEY: ${{ needs.resolve_backend.outputs.backend == 'api' && secrets.ANTHROPIC_API_KEY || '' }}
          INSTANCE_IP: ${{ env.INSTANCE_IP }}
          SSH_KEY_PATH: /tmp/deploy_key
          REMOTE_USER: ${{ env.REMOTE_USER }}
          REMOTE_APP_DIR: ${{ env.REMOTE_APP_DIR }}
          SERVICE_NAME: ${{ env.SERVICE_NAME }}
          # rollback_agent restarts this too: `git reset --hard` reverts the
          # whole checkout, so a service left running keeps serving the code
          # the rollback just decided was bad.
          ADMIN_SERVICE_NAME: ${{ env.ADMIN_SERVICE_NAME }}
          SERVICE_URL: ${{ env.PROD_URL }}
          PREVIOUS_COMMIT: ${{ steps.pre_deploy.outputs.previous_commit }}
          NEW_COMMIT: ${{ steps.diff.outputs.new_commit }}
          CHANGE_SUMMARY: ${{ steps.diff.outputs.change_summary }}
          FLOW_TO_TEST: "The homepage loads and login/registration renders."
        run: python3 -m req2prod.ai_prod_flow_runner

      - name: Clean up key material
        if: always()
        run: rm -f /tmp/deploy_key /tmp/deploy_key-cert.pub
