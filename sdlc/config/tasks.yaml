code_review_task:
  description: >
    Review the following code change before it is deployed:
    {diff}
    Check specifically for: correctness bugs, security issues
    (secrets, injection, unsafe file writes), anything that could lose
    or corrupt existing user data (auth records, uploaded resumes),
    and deviations from this project's established patterns. Only
    report issues you can point to a specific line or hunk for - do
    not speculate about code outside the diff.
  expected_output: >
    A pass/fail verdict, followed by a list of concrete findings (if
    any), each with the file/line and a one-sentence explanation of
    the risk. Empty findings list if there's nothing to flag.

local_test_task:
  description: >
    The following change was just made: {change_summary}
    Start the app locally the same way a developer would (its own
    venv, `streamlit run streamlit_app.py`), and confirm it boots
    without tracebacks or warnings in the startup log. This app is a
    websocket-driven single-page app, so a plain HTTP status check
    only proves the server is up - it does not prove a flow works.
    Actually drive the UI (via a real browser/automation tool) to
    exercise the flow this change affects: {flow_to_test}. If the
    local checkout lives somewhere your tools can't reach directly
    (for example, a sandboxed/permission-restricted folder), work
    from a full copy in a location you can reach instead of skipping
    real verification. Never log in as, reuse, or modify an existing
    real user's account or data - if the flow requires a logged-in
    user, register a new throwaway test account for it. Once done,
    remove any test account/data and temporary copies you created,
    and confirm the real local user data was left untouched. Report
    exactly what you did and what you observed at each step.
  expected_output: >
    A pass/fail verdict, the exact steps taken (including how you
    reached/ran the app and what test account/data you created), and
    either confirmation the flow works as expected or the exact
    error/output observed if it didn't. Explicit confirmation that
    any test account/data and temporary copies were cleaned up
    afterward.

prod_test_task:
  description: >
    A deploy was just made to production ({service_url}) containing:
    {change_summary}
    The production instance is reachable at {instance_ip} (SSH user
    {remote_user}, key already at {key_path}), and the app listens on
    port {app_port} on the server. Use the check_production_health
    tool - passing exactly these values - to actually check whether a
    real user session looks active right now, whether the app
    responds locally on the server, and whether the public domain
    responds. Do not guess at any of this from the description; call
    the tool and base your verdict only on what it returns. Report the
    active-user finding before anything else. Then decide pass/fail
    from the tool's result and, if relevant, exercise {flow_to_test}
    against the live app without creating data that could be mistaken
    for a real user's - clean up any test data you create.
  expected_output: >
    Whether an active user was detected, a pass/fail verdict for the
    smoke test grounded in the tool's actual output, and what was
    observed.

ux_review_task:
  description: >
    The following change was just confirmed to work functionally:
    {change_summary}
    This app's written UX guidelines are:
    {ux_guidelines}
    The app is running at {base_url} - pass this exact value as the
    base_url argument every time you call inspect_job_finder_page, do
    not guess a different host or port.
    Use the inspect_job_finder_page tool to actually look at both of
    this app's front-end views - call it once with view='main' and
    once with view='format' - focusing on {flow_to_test}. Do not call
    it against the admin page; that's not part of the user-facing UX.
    The tool logs in with its own throwaway test account and cleans up
    after itself, so you don't need to manage test data yourself.
    Check what the tool actually returned (visible text, screenshot
    path, computed styles/contrast ratios) against the guidelines
    above, point by point - do not report anything that isn't tied to
    a specific guideline section, and do not report anything the tool
    didn't actually surface. If you notice the guidelines document
    itself looks stale or wrong compared to what the tool observed,
    say so as a separate note rather than silently following or
    silently ignoring it.
  expected_output: >
    A pass/fail verdict on adherence to the UX guidelines (separate
    from functional pass/fail), covering both the main and format
    views, with a list of concrete findings (if any) each citing the
    specific guideline section violated, which view/step it was
    observed on, and why it matters, plus any note that the guidelines
    themselves seem out of date.

performance_test_task:
  description: >
    The following change was just made: {change_summary}
    Time how long {flow_to_test} actually takes to complete, end to
    end, by driving it in a real browser the same way local_tester
    does - register/use a throwaway test account if the flow needs a
    logged-in user, never a real user's account or data. Compare the
    measured time against the expected baseline: {baseline_seconds}
    seconds. If it's noticeably slower than that baseline, investigate
    before reporting: check the app's own logs (or ask for them) for
    how many LLM calls and tool calls happened during the run. In this
    app, a slow flow is usually caused by an agent making far more
    tool calls than it needs (extra searches to verify details it
    already has), not by the API or model itself being inherently
    slow - a single plain LLM call typically still takes on the order
    of a minute, so judge "slow" relative to the baseline and call
    count, not against an assumption that every step should be
    near-instant. Clean up any test account/data you create.
  expected_output: >
    The measured time in seconds, a pass/fail verdict against the
    baseline, and - if it failed - a short diagnosis pointing at the
    likely cause (e.g. "14 tool calls across 6 rounds" or "single LLM
    call took 70s") rather than just "it's slow." Confirmation any
    test account/data was cleaned up.

devops_fix_task:
  description: >
    The GitHub Actions workflow "{workflow_name}" (run ID {run_id})
    just failed. Call fetch_failed_run_logs with run_id={run_id} to get
    the actual failure output - do not form a theory about what went
    wrong before you've read it. Identify the precise root cause,
    quoting the exact error line(s) from that output. Then use the
    file-reading tool to look at whatever file is actually responsible
    (the failing workflow's own YAML under .github/workflows/, or
    application code if the log points there) before changing
    anything - confirm your hypothesis against its real current
    content, don't assume what it currently contains. Apply the
    smallest fix that addresses the confirmed root cause using the
    file-writing tool (pass overwrite=true), then call
    commit_and_push_fix with the exact file path(s) you changed and a
    one-line commit message describing the fix. Once that succeeds,
    call retrigger_deploy_workflow with workflow_file={workflow_file}
    to redeploy. Never touch .env, anything under data/ or users/, or
    make any change beyond what the confirmed root cause requires.
  expected_output: >
    The exact root cause (quoting the real error), which file(s) you
    changed and what the fix was, confirmation the commit was pushed
    (with its message), and confirmation the workflow was
    re-triggered.
  agent: devops_agent

rollback_task:
  description: >
    The production smoke test for commit {new_commit} failed with:
    {failure_reason}
    The production instance is reachable at {instance_ip} (SSH user
    {remote_user}, key already at {key_path}), the app directory is
    {remote_app_dir}, the systemd service is {service_name}, and the
    public URL is {service_url}. Use the rollback_production tool -
    passing exactly these values plus previous_commit={previous_commit}
    - to actually revert production to that commit and restart the
    service. Only do this because a test failure was already confirmed
    above - never speculatively. After the tool runs, use its own
    reported post-rollback HTTP status to confirm whether the rollback
    itself succeeded; do not assume it worked.
  expected_output: >
    Confirmation of which commit production is now running (from the
    tool's own output, not assumed), whether the post-rollback health
    check passed, and a summary of what failed originally for a human
    to investigate.
