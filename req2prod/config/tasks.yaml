code_review_task:
  description: >
    Review the following code change before it is deployed:
    {diff}
    Check specifically for: correctness bugs, security issues
    (secrets, injection, unsafe file writes), anything that could lose
    or corrupt existing user data (auth records, uploaded resumes),
    and deviations from this project's established patterns. Only
    report issues you can point to a specific line or hunk for - do
    not speculate about code outside the diff. Before flagging a
    pinned dependency version in requirements.txt, or a Claude
    LLM(model=...) id, as implausible or nonexistent, verify it first
    with check_pypi_package_version / check_anthropic_model_id - do
    not flag it on how unfamiliar it looks alone.
  expected_output: >
    A pass/fail verdict, followed by a list of concrete findings (if
    any), each with the file/line and a one-sentence explanation of
    the risk. Empty findings list if there's nothing to flag.

local_test_task:
  description: >
    The following change was just made: {change_summary}
    Start the app locally the same way a developer would (its own
    venv, `streamlit run streamlit_app.py`), and confirm it boots
    without tracebacks or warnings in the startup log. This app is a
    websocket-driven single-page app, so a plain HTTP status check
    only proves the server is up - it does not prove a flow works.
    Actually drive the UI (via a real browser/automation tool) to
    exercise the flow this change affects: {flow_to_test}. If the
    local checkout lives somewhere your tools can't reach directly
    (for example, a sandboxed/permission-restricted folder), work
    from a full copy in a location you can reach instead of skipping
    real verification. Never log in as, reuse, or modify an existing
    real user's account or data - if the flow requires a logged-in
    user, register a new throwaway test account for it. Once done,
    remove any test account/data and temporary copies you created,
    and confirm the real local user data was left untouched. Report
    exactly what you did and what you observed at each step.
  expected_output: >
    A pass/fail verdict, the exact steps taken (including how you
    reached/ran the app and what test account/data you created), and
    either confirmation the flow works as expected or the exact
    error/output observed if it didn't. Explicit confirmation that
    any test account/data and temporary copies were cleaned up
    afterward.

prod_test_task:
  description: >
    A deploy was just made to production ({service_url}) containing:
    {change_summary}
    The production instance is reachable at {instance_ip} (SSH user
    {remote_user}, key already at {key_path}), and the app listens on
    port {app_port} on the server. Use the check_production_health
    tool - passing exactly these values - to actually check whether a
    real user session looks active right now, whether the app
    responds locally on the server, whether the public domain
    responds, and whether the public domain's page actually renders
    the real app rather than an in-page exception. Do not guess at any
    of this from the description; call the tool and base your verdict
    only on what it returns. Report the active-user finding before
    anything else. A 200 status code does NOT by itself mean healthy -
    check page_renders_cleanly specifically, since a script-level crash
    (e.g. a missing dependency never installed on the server) still
    returns 200 while showing every visitor a traceback; treat
    page_renders_cleanly == false as a fail regardless of what the
    status codes say, and quote page_error_snippet if it's present. But
    if page_check_error is set instead (the page-render check itself
    couldn't run - e.g. its own browser tooling is missing), that is
    NOT a confirmed page failure - page_renders_cleanly will be null in
    that case, and you must judge health from the HTTP status codes
    alone rather than failing the deploy on page_check_error by itself;
    a tool that couldn't run tells you nothing about whether the app is
    actually broken. Then decide pass/fail from the tool's result and,
    if relevant,
    exercise {flow_to_test} against the live app without creating data
    that could be mistaken for a real user's - clean up any test data
    you create.
  expected_output: >
    Whether an active user was detected, a pass/fail verdict for the
    smoke test grounded in the tool's actual output (explicitly
    covering whether the page rendered cleanly, not just HTTP status
    codes), and what was observed.

ux_review_task:
  description: >
    The following change was just confirmed to work functionally:
    {change_summary}
    This app's written UX guidelines are:
    {ux_guidelines}
    The app is running at {base_url} - pass this exact value as the
    base_url argument every time you call inspect_job_finder_page, do
    not guess a different host or port.
    Use the inspect_job_finder_page tool to actually look at both of
    this app's front-end views - call it once with view='main' and
    once with view='format' - focusing on {flow_to_test}. Do not call
    it against the admin page; that's not part of the user-facing UX.
    The tool logs in with its own throwaway test account and cleans up
    after itself, so you don't need to manage test data yourself.
    Check what the tool actually returned (visible text, screenshot
    path, computed styles/contrast ratios) against the guidelines
    above, point by point - do not report anything that isn't tied to
    a specific guideline section, and do not report anything the tool
    didn't actually surface. If you notice the guidelines document
    itself looks stale or wrong compared to what the tool observed,
    say so as a separate note rather than silently following or
    silently ignoring it.
  expected_output: >
    A pass/fail verdict on adherence to the UX guidelines (separate
    from functional pass/fail), covering both the main and format
    views, with a list of concrete findings (if any) each citing the
    specific guideline section violated, which view/step it was
    observed on, and why it matters, plus any note that the guidelines
    themselves seem out of date.

performance_test_task:
  description: >
    The following change was just made: {change_summary}
    Time how long {flow_to_test} actually takes to complete, end to
    end, by driving it in a real browser the same way local_tester
    does - register/use a throwaway test account if the flow needs a
    logged-in user, never a real user's account or data. Compare the
    measured time against the expected baseline: {baseline_seconds}
    seconds. If it's noticeably slower than that baseline, investigate
    before reporting: check the app's own logs (or ask for them) for
    how many LLM calls and tool calls happened during the run. In this
    app, a slow flow is usually caused by an agent making far more
    tool calls than it needs (extra searches to verify details it
    already has), not by the API or model itself being inherently
    slow - a single plain LLM call typically still takes on the order
    of a minute, so judge "slow" relative to the baseline and call
    count, not against an assumption that every step should be
    near-instant. Clean up any test account/data you create.
  expected_output: >
    The measured time in seconds, a pass/fail verdict against the
    baseline, and - if it failed - a short diagnosis pointing at the
    likely cause (e.g. "14 tool calls across 6 rounds" or "single LLM
    call took 70s") rather than just "it's slow." Confirmation any
    test account/data was cleaned up.

devops_fix_task:
  description: >
    The GitHub Actions workflow "{workflow_name}" (run ID {run_id})
    just failed. Call fetch_failed_run_logs with run_id={run_id} to get
    the actual failure output - do not form a theory about what went
    wrong before you've read it. Identify the precise root cause,
    quoting the exact error line(s) from that output. Then use the
    file-reading tool to look at whatever file is actually responsible
    (the failing workflow's own YAML under .github/workflows/, or
    application code if the log points there) before changing
    anything - confirm your hypothesis against its real current
    content, don't assume what it currently contains. Apply the
    smallest fix that addresses the confirmed root cause using the
    file-writing tool (pass overwrite=true), then call
    commit_and_push_fix with the exact file path(s) you changed and a
    one-line commit message describing the fix. Once that succeeds,
    call retrigger_deploy_workflow with workflow_file={workflow_file}
    to redeploy. Never touch .env, anything under data/ or users/, or
    make any change beyond what the confirmed root cause requires.
  expected_output: >
    The exact root cause (quoting the real error), which file(s) you
    changed and what the fix was, confirmation the commit was pushed
    (with its message), and confirmation the workflow was
    re-triggered.
  agent: devops_agent

pr_fix_task:
  description: >
    code_reviewer requested changes on this pull request. Its exact
    findings are:
    {findings}
    For each finding, use the file-reading tool to open the real file
    at the location given and confirm the problem is actually there,
    then use the file-writing tool (pass overwrite=true) to apply the
    smallest fix that addresses it. If a finding doesn't reproduce when
    you check the real current file, leave that file alone and note why
    in your summary rather than changing something that isn't actually
    wrong. Never touch .env, anything under data/ or users/, or any
    file not named in a finding above. Do not attempt to commit, push,
    or open anything - only edit the files themselves.
  expected_output: >
    The exact list of file paths you actually changed (empty if none),
    and a one-paragraph summary of what you fixed and why, including
    any finding you deliberately left alone because it didn't
    reproduce.
  agent: pr_fix_agent

pr_arbiter_task:
  description: >
    code_reviewer and pr_fix_agent have already been through this pull
    request's review/fix loop as many times as the pipeline allows, and
    it still hasn't reached a clean approval. The current diff is:
    {diff}
    The findings still outstanding after the last review round are:
    {findings}
    Read the actual current files yourself with the file-reading tool
    for anything you need to verify - do not simply trust
    code_reviewer's characterization of how serious each finding is,
    since a review that couldn't converge may also have misjudged its
    own findings' real severity. Decide for real: is what's left safe
    to merge into this production-deployed app as-is, or must it not
    ship. Treat anything touching a secret/credential, authentication
    or session handling, data loss/corruption, or a genuine correctness
    bug that would break the app for real users as disqualifying. Treat
    style/naming/documentation-only findings, or anything that doesn't
    actually reproduce when you check the real file, as non-blocking.
    Marco is not a developer and has explicitly said he cannot make
    this call himself - your verdict is the actual final decision, not
    a recommendation for him to review.
  expected_output: >
    Whether it's safe_to_merge, a clear plain-language reasoning Marco
    could read and understand without a technical background, and a
    list of blocking_reasons (empty if safe_to_merge is true) - each
    specific enough that, if the PR must be abandoned instead of
    merged, Marco would understand why without needing to judge the
    code himself.
  agent: pr_arbiter

cto_review_task:
  description: >
    You are reviewing the WHOLE Job Finder project - both the app repo
    at {app_repo_path} (crewai-starter) and the infra repo at
    {infra_repo_path} (crewai-infra) - to decide, in the shoes of a
    hiring manager or senior engineer who just clicked a link from a
    resume, whether this looks like the work of someone operating at a
    senior level. Call git_repo_status once for each repo path to see
    the real tracked files, uncommitted changes, and recent commit
    history in each - do not guess from assumption, and note plainly if
    a repo path isn't a git repo at all (that's itself a finding). Use
    each repo's tracked_files list from git_repo_status to see its real
    top-level layout, then read_repo_file (path = repo path joined with
    a tracked_files entry, e.g. README.md) to actually open its README
    (or note its absence) and check for a LICENSE file. Then call
    github_live_repo_check on {app_repo_path} to see what a real visitor
    would actually find on GitHub right now - most importantly whether
    the repo is actually PUBLIC, since a repo that looks perfect locally
    is worthless linked from a resume if it's still private; also check
    its live description/homepage/topics, since an empty description on
    GitHub is a first-impression problem even if the README is great.
    Judge, across both repos together: does the app repo's README
    explain in under a minute what this is, why it exists, and what's
    technically interesting about it; does either repo point a reader to
    the other (someone landing on the app repo should discover the infra
    repo exists, and vice versa); is either repo's top-level layout
    self-explanatory to a stranger; is there leftover
    template/scaffolding cruft, embarrassing commit messages, or TODO
    placeholders visible in tracked files in either repo; is there a
    LICENSE in each; is the GitHub-hosted repo actually public with a
    real description. Tag every finding with which repo it's about -
    use "crewai-starter (GitHub)" for anything that's specifically about
    the live GitHub presence rather than the local checkout. Only report
    things you actually observed via the tools above - do not speculate
    about content you didn't open.
  expected_output: >
    persona="cto", a pass/fail verdict, whether any finding is blocking,
    a list of concrete findings (if any) each with the repo
    ("crewai-starter" or "crewai-infra"), the issue, why it matters to a
    reviewer who has 2-5 minutes, and a specific fix (empty findings
    list if there's nothing to flag), and a skill_signal covering the
    project as a whole: one sentence on what the combined first
    impression across both repos tells a hiring manager about Marco's
    ability to communicate and package technical work - grounded only in
    what you opened, never inflated. Return exactly one JSON object with
    these top-level fields only: persona, passed, blocking, findings (a
    list, possibly empty), skill_signal. Never return a single finding
    as the top-level object - every finding belongs nested inside the
    findings list, not at the top level.
  agent: cto

aws_review_task:
  description: >
    Review the Job Finder project's infrastructure as an AWS Lead
    Engineer judging whether it is production-grade. The IaC lives in
    the infra repo at {infra_repo_path} (crewai-infra) - call
    git_repo_status there and use its tracked_files list to find any
    Terraform/CloudFormation/CDK files, then read_repo_file (path =
    {infra_repo_path} joined with the tracked_files entry) to actually
    open them; note plainly if {infra_repo_path} isn't a git repo at all
    (that's itself a blocking finding for infrastructure code). Check:
    is state managed remotely (a committed .tfstate file is a real,
    blocking finding, not a style nit), are IAM policies scoped to least
    privilege rather than wildcard, are security groups free of
    unnecessarily open ingress (0.0.0.0/0 on sensitive ports), are
    variables used instead of hardcoded values, and is there any CI/CD
    actually applying this IaC rather than it only ever being run by
    hand - check for GitHub Actions workflow files in both
    {infra_repo_path} and {app_repo_path}. Use git_file_history in
    {infra_repo_path} on any credential-shaped file you find (.pem,
    .key, credentials, tfvars with secrets) to check whether it was ever
    committed, even if it's gitignored or deleted now. Then call
    aws_live_setup_check to see the REAL, currently-running AWS account
    - not what the Terraform code claims - and compare the two directly:
    do the live Lightsail instance's actual open ports match
    aws_lightsail_instance_public_ports in main.tf; is there any live
    resource (a second instance, an unattached static IP, an old
    snapshot) that main.tf doesn't define at all; does the live IAM
    user's attached/inline policies match what you'd expect from
    least-privilege IaC practice, or is there a broad policy (e.g.
    AdministratorAccess) attached by hand that Terraform never touches -
    that mismatch between code and reality is itself a blocking finding,
    since it means the code review alone would have missed it entirely;
    and does the live AWS Budget match budget_amount in budget.tf. Tag
    every finding with which repo it's in - use "crewai-infra (live AWS
    account)" as the repo for anything that's a live-setup finding with
    no corresponding Terraform file to point at.
  expected_output: >
    persona="aws_lead_engineer", a pass/fail verdict, whether any
    finding is blocking, a list of concrete findings (if any) each with
    the repo, the issue, why it matters, and a specific fix, and a
    skill_signal: one sentence on what the actual IaC AND the real,
    live AWS setup together demonstrate (or undercut) about Marco's AWS
    ability - grounded only in what you read and what
    aws_live_setup_check actually returned, never inflated. Return
    exactly one JSON object with these top-level fields only: persona,
    passed, blocking, findings (a list, possibly empty), skill_signal.
    Never return a single finding as the top-level object - every
    finding belongs nested inside the findings list, not at the top
    level.
  agent: aws_lead_engineer

python_review_task:
  description: >
    Review the Job Finder project's Python code as a Python Lead
    Engineer. The application code lives in the app repo at
    {app_repo_path} (crewai-starter) - call git_repo_status there and use
    its tracked_files list to see the real module/package layout (this
    list is already free of venv/, __pycache__, and other build
    artifacts if they're properly gitignored - their absence from
    tracked_files, or presence, is itself the finding), then
    read_repo_file (path = {app_repo_path} joined with a tracked_files
    entry) to open a representative sample of the actual source files,
    focusing on the main application code, not generated/vendored
    directories. Check for: sensible package structure, type hints, a
    real pinned dependency manifest, linting/formatting config
    (ruff/black/mypy), presence of any tests, idiomatic error handling
    versus bare except or print-debugging left in, and whether build
    artifacts (venv/, __pycache__/, .pyc, .DS_Store) are tracked in git -
    check tracked_files for this, not just what's on disk. Also call
    git_repo_status once on {infra_repo_path} to confirm its
    tracked_files don't include stray Python that should live in the app
    repo instead. Tag every finding with which repo it's in.
  expected_output: >
    persona="python_lead_engineer", a pass/fail verdict, whether any
    finding is blocking, a list of concrete findings (if any) each with
    the repo, the issue, why it matters to an experienced Python
    reviewer, and a specific fix, and a skill_signal: one sentence on
    what the actual source you opened demonstrates (or undercuts) about
    Marco's Python ability - grounded only in what you read, never
    inflated. Return exactly one JSON object with these top-level fields
    only: persona, passed, blocking, findings (a list, possibly empty),
    skill_signal. Never return a single finding as the top-level object
    - every finding belongs nested inside the findings list, not at the
    top level.
  agent: python_lead_engineer

data_review_task:
  description: >
    Review the Job Finder project's data handling as a Data Engineer.
    Call git_repo_status on the app repo at {app_repo_path}
    (crewai-starter, where the SQLite auth DB and per-user file storage
    live) and check its tracked_files list for any database files, data
    exports, or per-user/customer data directories that are actually
    tracked in git - not just present on disk. Use read_repo_file (path
    = {app_repo_path} joined with a tracked_files entry) to check whether
    config/schema is separated from code and whether there is any data
    validation. Also check the infra repo at
    {infra_repo_path} for any tracked Terraform state or output files
    that could contain real resource data. If you find a database file,
    data directory, state file, or anything that could contain real user
    records or PII tracked in either repo, use git_file_history (in that
    same repo) on it to confirm whether it's in history even if
    gitignored now - this is a serious, blocking finding, not a nitpick.
    Tag every finding with which repo it's in.
  expected_output: >
    persona="data_engineer", a pass/fail verdict, whether any finding is
    blocking, a list of concrete findings (if any) each with the repo,
    the issue, why it matters, and a specific fix, and a skill_signal:
    one sentence on what the actual data/schema handling you found
    demonstrates (or undercuts) about Marco's data engineering ability -
    grounded only in what you read, never inflated. Return exactly one
    JSON object with these top-level fields only: persona, passed,
    blocking, findings (a list, possibly empty), skill_signal. Never
    return a single finding as the top-level object - every finding
    belongs nested inside the findings list, not at the top level.
  agent: data_engineer

ai_review_task:
  description: >
    Review the Job Finder project's AI agent design as an AI Engineer.
    The agent/prompt/orchestration code lives in the app repo at
    {app_repo_path} (crewai-starter) - call git_repo_status there and use
    its tracked_files list to find it, then read_repo_file (path =
    {app_repo_path} joined with a tracked_files entry) to open it (for
    example the CrewAI agent and task definitions, including this very
    req2prod/ panel). Judge whether
    the agent design is documented and structured rather than ad hoc,
    whether model/API keys are loaded only from environment variables
    rather than inline, whether there's any evaluation or guardrail
    against bad model output, and whether the orchestration reflects
    real engineering judgment about cost/latency (e.g. cheaper models
    for lower-stakes steps) rather than one model used everywhere
    without reasoning. {infra_repo_path} is Terraform-only and not in
    scope for this review unless you find AI-related code there too.
  expected_output: >
    persona="ai_engineer", a pass/fail verdict, whether any finding is
    blocking, a list of concrete findings (if any) each with the repo,
    the issue, why it matters, and a specific fix, and a skill_signal:
    one sentence on what the actual agent/orchestration code you opened
    demonstrates (or undercuts) about Marco's AI engineering ability -
    grounded only in what you read, never inflated. Return exactly one
    JSON object with these top-level fields only: persona, passed,
    blocking, findings (a list, possibly empty), skill_signal. Never
    return a single finding as the top-level object - every finding
    belongs nested inside the findings list, not at the top level.
  agent: ai_engineer

security_review_task:
  description: >
    CRITICAL RULE, applies to everything below: if you find an actual
    secret, password, key, or credential VALUE, never quote or repeat
    that literal value anywhere in your output - not in issue, fix, or
    skill_signal. Describe where it is (file, line, variable/constant
    name) and what kind of value it is, but write the value itself as
    [REDACTED]. Your output feeds a CTO synthesis step and a public
    LinkedIn activity log, neither of which should ever end up
    containing the literal secret - reporting that it exists and
    exactly where is enough to act on; repeating it just creates a
    second exposure. Review the WHOLE Job Finder project as a Security
    Engineer with veto power over the whole panel's verdict, covering
    BOTH the app repo at
    {app_repo_path} (crewai-starter) and the infra repo at
    {infra_repo_path} (crewai-infra) - a leak in either repo blocks
    publication of the project. Call git_repo_status once for each repo
    path to get its real tracked-files list and recent commit history;
    note plainly if a repo path isn't a git repo at all. For every file
    in either repo that looks like it could be a secret, private key,
    credential, environment file, or state file (.env - not
    .env.example, .pem, .key, *.tfstate, credentials.json, or similar),
    check whether it appears in that repo's tracked_files, AND run
    git_file_history on it in that same repo regardless - a file that's
    gitignored now may still be sitting in history from before the
    .gitignore rule existed, which needs a history rewrite, not just
    deletion. Use read_repo_file to open each repo's actual .gitignore
    (path = repo path joined with ".gitignore") and confirm it really
    excludes what it should. Also open the auth-related source file(s)
    in {app_repo_path} (via its tracked_files list and read_repo_file)
    and check for
    plaintext password storage, weak session handling, or missing rate
    limiting. Then call aws_live_setup_check to see the REAL, currently
    running AWS account this project deploys to, and scrutinize it the
    way you'd scrutinize code: is any IAM user carrying a broad managed
    policy (e.g. AdministratorAccess) rather than least-privilege - flag
    this as blocking, since an overprivileged deploy credential is a
    genuine production risk regardless of how clean the Terraform code
    looks; are the live Lightsail instance's actual open ports limited
    to what's needed (22/80/443), or is something wider open than
    main.tf's aws_lightsail_instance_public_ports claims; is there any
    live resource that isn't accounted for in code at all. A mismatch
    between what the Terraform code claims and what's actually running
    is itself worth flagging even when not blocking on its own, since it
    means infra-as-code isn't the full source of truth here. Also call
    github_live_repo_check on {app_repo_path} to see GitHub's own
    security posture for this repo: are Dependabot alerts and secret
    scanning actually turned on (both are free once a repo is public,
    but neither is on by default), and are there any currently-open
    Dependabot or secret-scanning alerts - GitHub's own scanners are an
    independent second opinion alongside your own tracked-files/history
    checks, not a replacement for them. Treat any confirmed leaked
    secret, key, PII, overprivileged live credential, or open
    GitHub-flagged alert as blocking, full stop - regardless of how good
    everything else looks. Tag every finding with which repo it's in -
    use "crewai-infra (live AWS account)" for a live-AWS-setup finding
    with no corresponding Terraform file to point at, and "crewai-starter
    (GitHub)" for anything specifically about the live GitHub presence.
  expected_output: >
    persona="security_engineer", a pass/fail verdict, a list of concrete
    findings (if any) each with the repo, the issue, why it matters, and
    a specific fix - with blocking set true if you found anything
    disqualifying in either repo or in the live AWS account - and a
    skill_signal: one sentence on what the actual security posture you
    found, across both repos' code AND the real live AWS account,
    demonstrates about Marco's ability, which should be positive only if
    you genuinely found nothing wrong anywhere - never inflated. Return
    exactly one JSON object with these top-level fields only: persona,
    passed, blocking, findings (a list, possibly empty), skill_signal.
    Never return a single finding as the top-level object - every
    finding belongs nested inside the findings list, not at the top
    level.
  agent: security_engineer

readiness_synthesis_task:
  description: >
    CRITICAL RULE: if any finding you're synthesizing (especially from
    the Security Engineer) references an actual secret/password/key
    value, never quote or repeat that literal value in your verdict or
    blocking_issues - write [REDACTED] in its place. This verdict feeds
    a public LinkedIn activity log; the literal value must never appear
    in it. You are the CTO chairing this panel, and this whole review exists
    because the Job Finder project - the app repo at {app_repo_path}
    (crewai-starter) AND the infra repo at {infra_repo_path}
    (crewai-infra), always assessed together as one project - is Marco's
    commercial for his own technical abilities, linked straight from his
    resume. You already did your own first-impression review of both
    repos above. Now read the findings AND skill_signal from the AWS
    Lead Engineer, Python Lead Engineer, Data Engineer, AI Engineer, and
    Security Engineer tasks (given to you as context) and synthesize one
    final verdict for the project as a whole. The Security Engineer's
    findings marked blocking always make the overall verdict not-ready,
    no matter what the other four say, regardless of which repo they're
    in. Pull every blocking finding from every persona, from both repos,
    into one merged blocking_issues list, each still tagged with its
    repo. Pick the 3-5 highest-leverage quick_wins across all findings in
    both repos - the changes that most improve the pitch for the effort
    involved. Then build skills_showcase: take every persona's
    skill_signal (including your own) that is genuinely positive and
    turn it into a specific, evidence-backed talking point a hiring
    manager would remember - e.g. "least-privilege IAM and remote
    Terraform state in the infra repo show production AWS judgment, not
    just a working demo" rather than generic praise like "good code
    quality." Every entry must trace back to something a panelist
    actually observed in one of the two repos - never invent or inflate
    one, and skip any persona whose signal wasn't genuinely positive
    rather than manufacturing one for them.
  expected_output: >
    Whether the whole project (both repos) is ready_to_publish, a
    one-paragraph verdict explaining the single biggest reason, the full
    blocking_issues list merged from every persona and every repo, 3-5
    quick_wins, and skills_showcase: the evidence-backed list of
    specific technical abilities this project currently demonstrates to
    a hiring manager.
  agent: cto

feature_requirements_task:
  description: >
    A new feature has been requested for the Job Finder app:
    {feature_request}
    Challenge and structure this the way a good Product Manager would:
    who is it for, what problem does it solve that the app doesn't
    already solve, what does "done" look like in concrete testable
    terms, what edge cases matter (no resume uploaded yet, zero search
    results, a returning vs first-time user), and what's explicitly out
    of scope for this pass. Resolve as much of this yourself as you
    reasonably can from the app's existing purpose and patterns - only
    raise something as an open question if it genuinely requires
    Marco's own product/priority judgment, never for a detail you could
    reasonably decide yourself.
  expected_output: >
    A short user story, a concrete list of acceptance criteria a
    tester could check off one by one, a list of open questions (empty
    if none) that genuinely need Marco's input rather than an
    engineering decision, and an explicit ready_for_development verdict
    that must be true if and only if open_questions is empty - true
    means engineering could start from this alone, false means at least
    one open question still needs Marco's answer first.
  agent: product_manager

architecture_direction_task:
  description: >
    The Product Manager's requirements for this feature are given to
    you as context. Decide the concrete technical direction: does this
    fit inside the existing Job Finder app (Streamlit + CrewAI, this
    same repo) as-is, or does it need new infrastructure or a separate
    service - and if so, exactly what and why. Call out non-functional
    requirements that actually apply given this app's real constraints:
    a single Streamlit process (so background/scheduled work can't just
    live inside a request-response cycle), SQLite-backed auth and
    per-user users/<email>/ file storage (so anything touching auth.py
    or the schema must stay backward compatible with existing user
    records), and a single production server with manual deploy (so
    anything writing shared state needs to consider concurrent
    sessions). If any part of the PM's requirements is still ambiguous
    from a technical-design standpoint, list it as a clarification
    needed rather than guessing an assumption.
  expected_output: >
    Whether the feature builds on the existing app or needs new
    infrastructure (and what, if so), a list of non-functional
    requirements that apply, technical notes concrete enough for an
    engineer to start from, a list of clarifications needed from the
    Product Manager (empty if none), and an explicit
    ready_for_development verdict that must be true if and only if
    clarifications_needed is empty - true means an engineer could start
    building from this direction alone, false means at least one
    clarification still needs the Product Manager's answer first.
  agent: software_architect

feature_build_task:
  description: >
    The Product Manager's approved requirements for this feature are:
    {pm_requirements}
    The Software Architect's approved technical direction is:
    {architecture_direction}
    Both were already confirmed ready for development before you were
    handed this task - implement it in this repository (crewai-starter).
    The main Streamlit app is streamlit_app.py at the repository root -
    start there rather than guessing at other filenames or paths (there
    is no app.py, main.py, Home.py, or pages/ directory). Read the
    actual existing code relevant to the change with the file-reading
    tool before writing anything - never assume how something
    currently works. For any small or medium change to an existing
    file, use the edit tool (find the exact existing text, replace it
    with your new text) - call it more than once if several separate
    spots need changing. Only use the file-writing tool (which
    replaces a file's entire content) for a genuinely new file, or a
    change so extensive across the whole file that a full rewrite is
    actually simpler than several edits. Match this codebase's established
    conventions (Streamlit + CrewAI, SQLite-backed auth, per-user
    users/<email>/ file storage) and build only what the requirements
    and direction actually call for - no unrelated refactors, no
    defensive handling for scenarios that can't happen. If the
    *functional* intent is unclear even after reading the requirements,
    ask product_manager directly rather than guessing; if the
    *technical* direction is unclear, ask software_architect. Once the
    change is complete, call create_feature_branch_and_open_pr with a
    descriptive branch name (e.g. feature/short-slug), exactly the file
    paths you changed, a commit message, and a PR title/body
    summarizing the feature and referencing the requirements and
    technical direction - never pass 'main' or 'master' as the branch
    name, and never attempt to merge the PR yourself.
  expected_output: >
    The branch name used, the list of files changed, a summary of what
    was built, the PR URL (from create_feature_branch_and_open_pr's own
    output, not assumed), and a list of any questions you asked
    product_manager or software_architect while building (empty if
    none).
  agent: software_engineer

rollback_task:
  description: >
    The production smoke test for commit {new_commit} failed with:
    {failure_reason}
    The production instance is reachable at {instance_ip} (SSH user
    {remote_user}, key already at {key_path}), the app directory is
    {remote_app_dir}, the systemd service is {service_name}, and the
    public URL is {service_url}. Use the rollback_production tool -
    passing exactly these values plus previous_commit={previous_commit}
    - to actually revert production to that commit and restart the
    service. Only do this because a test failure was already confirmed
    above - never speculatively. After the tool runs, use its own
    reported post-rollback HTTP status to confirm whether the rollback
    itself succeeded; do not assume it worked.
  expected_output: >
    Confirmation of which commit production is now running (from the
    tool's own output, not assumed), whether the post-rollback health
    check passed, and a summary of what failed originally for a human
    to investigate.

retrospective_task:
  description: >
    A notable outcome just occurred in the Req2Prod pipeline.
    Trigger: {trigger}.

    Full context of what happened:
    {outcome_context}

    The agent most likely to need a new lesson is "{candidate_agent}".
    Its current lessons are:
    {current_lessons}

    Decide whether there is a genuine, generalizable lesson here. Do NOT
    add one if the outcome was a one-off with nothing an agent could do
    differently, or if it is already covered by an existing lesson above.
    If there is a real lesson, draft exactly one entry in the same format
    as the existing lessons - a line "## <ID> - <short imperative title>"
    followed by "- **Source:**", "- **Severity:**", "- **Trigger:**",
    and "- **Rule:**" lines. Pick the next unused ID for the target agent
    (its lessons use a short prefix, e.g. PT-04 for prod_tester), and set
    Source to "{today} - {trigger}". Target the single agent whose
    behaviour should change - usually "{candidate_agent}", but pick a
    different one if the evidence clearly points elsewhere.
  expected_output: >
    add_lesson (true only if a lesson should be added), the target_agent
    key, the chosen lesson_id, the full lesson_markdown entry exactly as
    it should be appended, and a one-line rationale.
  agent: retrospective

lesson_arbitration_task:
  description: >
    The retrospective agent has drafted a new lesson to add to the
    Req2Prod lessons store, targeting agent "{target_agent}". The drafted
    lesson is:
    {drafted_lesson}

    Rationale given: {rationale}

    The outcome that prompted it:
    {outcome_context}

    You are the approver - this lesson changes how "{target_agent}"
    behaves, so nothing is added without your sign-off. Approve it only
    if it is (a) genuinely generalizable rather than a reaction to a
    one-off, (b) concrete and checkable rather than a platitude, (c)
    correctly targeted at an agent that can actually act on it, and (d)
    not already implied by that agent's existing behaviour or lessons.
    Reject vague, duplicate, or over-correcting lessons.
  expected_output: >
    safe_to_merge true/false (true = add the lesson), your reasoning in
    plain language, and any blocking reasons if you reject it.
  agent: pr_arbiter
